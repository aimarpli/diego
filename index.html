<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Construcción | Próximamente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; overflow-x: hidden; }
        @keyframes float-slow { 0%, 100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } }
        @keyframes float-medium { 0%, 100% { transform: translateY(0px) translateX(0px); } 50% { transform: translateY(20px) translateX(-15px); } }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.3; filter: blur(80px); } 50% { opacity: 0.6; filter: blur(100px); } }
        .glow-orb-1 { animation: float-slow 15s ease-in-out infinite, pulse-glow 8s ease-in-out infinite; }
        .glow-orb-2 { animation: float-medium 18s ease-in-out infinite, pulse-glow 10s ease-in-out infinite; }
        .bg-grid-pattern { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px); }
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.07); }
        .glow-button { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glow-button:hover { box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); transform: translateY(-1px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col justify-between relative bg-grid-pattern selection:bg-blue-600 selection:text-white">

    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="glow-orb-1 absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-blue-600/20 blur-[80px]"></div>
        <div class="glow-orb-2 absolute top-[30%] right-[-5%] w-[45vw] h-[45vw] rounded-full bg-cyan-500/15 blur-[90px]"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-transparent via-slate-950/40 to-slate-950"></div>
    </div>

    <header class="w-full max-w-7xl mx-auto px-6 py-8 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-3">
            <div class="relative flex items-center justify-center">
                <div id="header-icon-glow" class="absolute inset-0 rounded-xl bg-gradient-to-tr from-blue-500 to-cyan-400 blur-sm opacity-70 animate-pulse"></div>
                <div id="header-icon-container" class="relative bg-slate-900 border border-white/10 p-2.5 rounded-xl text-blue-400">
                    <i id="header-icon" data-lucide="layers" class="w-6 h-6"></i>
                </div>
            </div>
            <div>
                <span id="header-brand-name" class="text-xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400">NEXUS</span>
            </div>
        </div>
        <div>
            <span class="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-full glass-panel text-xs font-medium text-blue-300 border border-blue-500/20">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping"></span>
                Lanzamiento Próximo
            </span>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 py-12 flex flex-col items-center justify-center text-center relative z-10 my-auto">
        <div class="mb-6 flex items-center gap-2 px-4 py-1.5 rounded-full glass-panel text-sm text-slate-300">
            <i data-lucide="hammer" class="w-4 h-4 text-blue-400 animate-bounce"></i>
            <span>Plataforma en fase final de desarrollo</span>
        </div>
        <h1 id="main-title" class="text-4xl sm:text-6xl md:text-7xl font-extrabold tracking-tight mb-6 leading-tight">
            Algo increíble está <br>
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-cyan-400 to-indigo-500">en construcción</span>
        </h1>
        <p class="text-slate-400 text-base sm:text-xl max-w-2xl mb-12 font-light leading-relaxed">
            Estamos afinando los últimos detalles para ofrecerte una experiencia digital sin precedentes.
        </p>
        <div id="countdown-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-2xl w-full mb-12">
            <div class="glass-panel rounded-2xl p-4 sm:p-6 flex flex-col items-center relative overflow-hidden group">
                <span id="days" class="text-3xl font-extrabold text-white mb-1">00</span>
                <span class="text-xs uppercase text-slate-400">Días</span>
            </div>
            <div class="glass-panel rounded-2xl p-4 sm:p-6 flex flex-col items-center relative overflow-hidden group">
                <span id="hours" class="text-3xl font-extrabold text-white mb-1">00</span>
                <span class="text-xs uppercase text-slate-400">Horas</span>
            </div>
            <div class="glass-panel rounded-2xl p-4 sm:p-6 flex flex-col items-center relative overflow-hidden group">
                <span id="minutes" class="text-3xl font-extrabold text-white mb-1">00</span>
                <span class="text-xs uppercase text-slate-400">Minutos</span>
            </div>
            <div class="glass-panel rounded-2xl p-4 sm:p-6 flex flex-col items-center relative overflow-hidden group">
                <span id="seconds" class="text-3xl font-extrabold text-blue-400 mb-1">00</span>
                <span class="text-xs uppercase text-slate-400">Segundos</span>
            </div>
        </div>
    </main>

    <footer class="w-full mx-auto px-6 py-8 flex justify-center items-center relative z-10 border-t border-white/[0.04]">
        <button onclick="openPinModal()" class="text-xs text-slate-500 hover:text-blue-400 flex items-center gap-1.5 transition-colors focus:outline-none select-none">
            <span id="footer-copyright-text">© 2026 NEXUS. Todos los derechos reservados.</span>
            <i data-lucide="lock" class="w-3.5 h-3.5 opacity-30 hover:opacity-100"></i>
        </button>
    </footer>

    <!-- MODAL PIN -->
    <div id="pin-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-sm glass-panel rounded-3xl p-6 relative shadow-2xl border border-blue-500/20">
            <button onclick="closePinModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="text-center mb-6">
                <h3 class="text-lg font-bold">Acceso de Administrador</h3>
            </div>
            <div class="flex justify-center gap-3 mb-6">
                <div id="pin-dot-1" class="w-4 h-4 rounded-full border border-slate-600"></div>
                <div id="pin-dot-2" class="w-4 h-4 rounded-full border border-slate-600"></div>
                <div id="pin-dot-3" class="w-4 h-4 rounded-full border border-slate-600"></div>
                <div id="pin-dot-4" class="w-4 h-4 rounded-full border border-slate-600"></div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="pressPin('1')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">1</button>
                <button onclick="pressPin('2')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">2</button>
                <button onclick="pressPin('3')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">3</button>
                <button onclick="pressPin('4')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">4</button>
                <button onclick="pressPin('5')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">5</button>
                <button onclick="pressPin('6')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">6</button>
                <button onclick="pressPin('7')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">7</button>
                <button onclick="pressPin('8')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">8</button>
                <button onclick="pressPin('9')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">9</button>
                <button onclick="clearPin()" class="py-3 rounded-2xl bg-rose-500/10 text-rose-400 text-xs">Limpiar</button>
                <button onclick="pressPin('0')" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10 font-bold">0</button>
                <button onclick="deleteLastPinDigit()" class="py-3 rounded-2xl bg-white/5 hover:bg-white/10"><i data-lucide="delete" class="w-5 h-5 mx-auto"></i></button>
            </div>
        </div>
    </div>

    <!-- PANEL ADMIN -->
    <div id="admin-panel-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-2xl glass-panel rounded-3xl p-6 md:p-8 shadow-2xl border border-blue-500/20 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="text-xl font-extrabold">Panel de Control</h2>
                <button onclick="closeAdminPanel()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex flex-col gap-4">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Nombre de Marca</label>
                    <input id="input-brand-name" type="text" class="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-sm focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Icono (Selección o URL)</label>
                    <select id="select-brand-icon" class="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-sm mb-2 focus:border-blue-500 outline-none">
                        <option value="layers">Capas (Defecto)</option>
                        <option value="rocket">Cohete</option>
                        <option value="hammer">Martillo</option>
                        <option value="terminal">Terminal</option>
                        <option value="none">Sin Icono</option>
                    </select>
                    <input id="input-custom-icon-url" type="url" placeholder="O pega una URL de imagen aquí..." class="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-sm focus:border-blue-500 outline-none">
                </div>
                <button onclick="applyChanges()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl mt-4">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let brandName = localStorage.getItem("nexus_brand_name") || "NEXUS";
        let mainTitleHTML = localStorage.getItem("nexus_main_title") || `Algo increíble está <br><span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-cyan-400 to-indigo-500">en construcción</span>`;
        let headerIconName = localStorage.getItem("nexus_header_icon") || "layers";
        let customIconUrl = localStorage.getItem("nexus_custom_icon_url") || "";
        let enteredPin = "";
        const PIN_XOR_SEQUENCE = [29, 27, 25, 30];

        function syncAllBrandTexts() {
            document.getElementById("header-brand-name").innerText = brandName;
            document.getElementById("footer-copyright-text").innerText = `© 2026 ${brandName}. Todos los derechos reservados.`;
        }

        function applyHeaderIcon(iconName, customUrl) {
            const iconContainer = document.getElementById("header-icon-container");
            const iconGlow = document.getElementById("header-icon-glow");
            
            if (customUrl && customUrl.trim() !== "") {
                iconContainer.innerHTML = `<img src="${customUrl}" class="w-6 h-6 object-contain" />`;
                iconGlow.classList.remove("hidden");
            } else if (iconName === "none") {
                iconContainer.classList.add("hidden");
                iconGlow.classList.add("hidden");
            } else {
                iconContainer.innerHTML = `<i id="header-icon" data-lucide="${iconName}" class="w-6 h-6"></i>`;
                iconContainer.classList.remove("hidden");
                iconGlow.classList.remove("hidden");
                lucide.createIcons();
            }
        }

        // Inicialización
        syncAllBrandTexts();
        applyHeaderIcon(headerIconName, customIconUrl);

        function openPinModal() { document.getElementById("pin-modal").classList.remove("hidden"); setTimeout(() => document.getElementById("pin-modal").classList.add("opacity-100"), 50); }
        function closePinModal() { document.getElementById("pin-modal").classList.remove("opacity-100"); setTimeout(() => document.getElementById("pin-modal").classList.add("hidden"), 300); }
        
        function pressPin(num) {
            if (enteredPin.length < 4) {
                enteredPin += num;
                if (enteredPin.length === 4) {
                    const isValid = enteredPin.split('').every((char, i) => (char.charCodeAt(0) ^ 42) === PIN_XOR_SEQUENCE[i]);
                    if (isValid) { closePinModal(); openAdminPanel(); } else { enteredPin = ""; }
                }
            }
        }
        function clearPin() { enteredPin = ""; }
        function deleteLastPinDigit() { enteredPin = enteredPin.slice(0, -1); }
        
        function openAdminPanel() {
            document.getElementById("input-brand-name").value = brandName;
            document.getElementById("select-brand-icon").value = headerIconName;
            document.getElementById("input-custom-icon-url").value = customIconUrl;
            document.getElementById("admin-panel-modal").classList.remove("hidden");
            setTimeout(() => document.getElementById("admin-panel-modal").classList.add("opacity-100"), 50);
        }
        function closeAdminPanel() { document.getElementById("admin-panel-modal").classList.remove("opacity-100"); setTimeout(() => document.getElementById("admin-panel-modal").classList.add("hidden"), 300); }

        function applyChanges() {
            brandName = document.getElementById("input-brand-name").value.trim() || "NEXUS";
            headerIconName = document.getElementById("select-brand-icon").value;
            customIconUrl = document.getElementById("input-custom-icon-url").value.trim();
            
            localStorage.setItem("nexus_brand_name", brandName);
            localStorage.setItem("nexus_header_icon", headerIconName);
            localStorage.setItem("nexus_custom_icon_url", customIconUrl);
            
            syncAllBrandTexts();
            applyHeaderIcon(headerIconName, customIconUrl);
            closeAdminPanel();
        }
    </script>
</body>
</html>
